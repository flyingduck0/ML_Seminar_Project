name: Daily Market Data Update

on:
  schedule:
    # This runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: main # Explicitly forces the action to use the main branch

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance requests pytz pyarrow lightgbm scikit-learn statsmodels scipy

      - name: Step 1 - Run Main Pipeline
        # Refreshes the master dataset: Final_Pipeline_Data.csv
        run: python Pipeline_finished_not_cleanedup.py

      - name: Step 2 - Run ML Analysis
        # Reads the new dataset and outputs files to the ./results/ folder
        run: python MLanalysis_final.py

      - name: Commit and Push changes to Main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Only stage the specific files we want to update
          git add Final_Pipeline_Data.csv
          git add results/
          
          git commit -m "Automated daily update: Master dataset and ML results" || echo "No changes to commit"
          
          # Explicitly push back to the main branch
          git push origin main
