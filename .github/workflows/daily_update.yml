name: Daily Market Data Update

on:
  push:
    branches: [ main ]  # This makes it run EVERY time you upload a file
  schedule:
    - cron: '18 22 * * *' # 00:10 NL Time
  workflow_dispatch:

# REQUIRED: This gives the bot permission to push the CSVs back to your repo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests matplotlib yfinance pytz scipy statsmodels lightgbm pyarrow scikit-learn py_clob_client beautifulsoup4 lxml html5lib

      - name: Step 1 - Run Main Pipeline
        run: python Pipeline_finished.py

      - name: Step 2 - Run ML Analysis
        run: python MLanalysis_final.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage your specific output files
          git add Final_Pipeline_Data.csv
          git add results/
          
          # Only commit if there are actually changes to the data
          git commit -m "Automated daily update: Data and ML results" || echo "No changes to commit"
          git push origin main
