name: Daily Market Data Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          # Explicitly targets your testing branch
          ref: Testing_pipeline 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance requests pytz pyarrow lightgbm scikit-learn statsmodels scipy

      - name: Step 1 - Run Main Pipeline
        run: python Pipeline_finished_not_cleanedup.py

      - name: Step 2 - Run ML Analysis
        run: python MLanalysis_final.py

      - name: Commit and Push changes to Testing Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Only stage the specific files
          git add Final_Pipeline_Data.csv
          git add results/
          
          git commit -m "Automated daily update: Testing branch" || echo "No changes to commit"
          
          # Explicitly pushes back to the correct testing branch
          git push origin Testing_pipeline
